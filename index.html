<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Divulgação - v4.5 Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primaria: #F39200; --fundo: #0E1117; --card: #161B22; --texto: #C9D1D9; --borda: #30363D; --sucesso: #238636; }
        body { font-family: 'Inter', sans-serif; background: var(--fundo); margin: 0; color: var(--texto); overflow-x: hidden; }
        
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--borda); width: 90%; max-width: 320px; text-align: center; }
        
        #main-system { display: none; }
        .header { background: #161B22; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--borda); position: sticky; top: 0; z-index: 100; justify-content: space-between; }
        
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--borda); margin-bottom: 20px; }
        .btn { background: var(--primaria); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        .input-dark { background: #0D1117; border: 1px solid var(--borda); color: white; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        
        /* MAPA QUE NÃO RECUSA CONEXÃO */
        .map-frame { width: 100%; height: 400px; border-radius: 8px; border: 1px solid var(--primaria); background: #000; }
        .status-badge { background: var(--sucesso); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h3 style="color: var(--primaria)">Acesso Nova Divulgação</h3>
            <p style="font-size: 0.8rem; color: #8B949E; margin-bottom: 20px;">Usuário: <b>admin</b> ou <b>cliente</b><br>Senha: <b>123</b></p>
            <input type="text" id="user" class="input-dark" placeholder="Usuário">
            <input type="password" id="pass" class="input-dark" placeholder="Senha">
            <button class="btn" onclick="autenticar()">ENTRAR</button>
        </div>
    </div>

    <div id="main-system">
        <div class="header">
            <b id="user-title" style="color:var(--primaria)">SISTEMA</b>
            <div style="cursor: pointer; font-size: 0.8rem;" onclick="location.reload()">Sair <i class="fas fa-sign-out-alt"></i></div>
        </div>

        <div class="container">
            
            <div id="view-admin" class="content-section">
                <h3>📊 Painel do Gestor</h3>
                <div class="card">
                    <h4>Mapa de Frotas Ativo</h4>
                    <iframe class="map-frame" src="https://www.openstreetmap.org/export/embed.html?bbox=-48.5444%2C-21.4363%2C-48.4719%2C-21.3915&layer=mapnik"></iframe>
                </div>
            </div>

            <div id="view-func" class="content-section">
                <h3>📲 Painel da Equipe</h3>
                <div class="card">
                    <h4>Operação de Campo</h4>
                    <button class="btn" style="background: var(--sucesso);" onclick="alert('GPS Iniciado!')">INICIAR ROTA</button>
                    <p style="margin-top: 15px;">Coordenadas: <span id="gps-status">Aguardando...</span></p>
                    <button class="btn" style="background: #30363D;" onclick="pegarLocalizacao()">Capturar GPS</button>
                </div>
            </div>

            <div id="view-cliente" class="content-section">
                <h3>📋 Acompanhamento do Cliente</h3>
                <div class="card">
                    <p>Status: <b style="color:var(--primaria)">Em andamento (65%)</b></p>
                    <div style="background:#30363D; border-radius:10px; height:8px;"><div style="background:var(--primaria); height:100%; width:65%; border-radius:10px;"></div></div>
                </div>
                <div class="card">
                    <h4>Localização do Veículo</h4>
                    <iframe class="map-frame" src="https://www.openstreetmap.org/export/embed.html?bbox=-48.5444%2C-21.4363%2C-48.4719%2C-21.3915&layer=mapnik"></iframe>
                </div>
            </div>

        </div>
    </div>

    <script>
        function autenticar() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            const title = document.getElementById('user-title');
            
            if(p === "123") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-system').style.display = 'block';

                document.getElementById('view-admin').classList.remove('active');
                document.getElementById('view-func').classList.remove('active');
                document.getElementById('view-cliente').classList.remove('active');

                if(u === "admin") {
                    title.innerText = "GESTOR";
                    document.getElementById('view-admin').classList.add('active');
                } else if(u === "func") {
                    title.innerText = "EQUIPE";
                    document.getElementById('view-func').classList.add('active');
                } else if(u === "cliente") {
                    title.innerText = "CLIENTE";
                    document.getElementById('view-cliente').classList.add('active');
                }
            } else { alert("Senha incorreta!"); }
        }

        function pegarLocalizacao() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('gps-status').innerText = pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4);
                    alert("Posição enviada!");
                });
            }
        }
    </script>
</body>
</html>
