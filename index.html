<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Divulgação - Enterprise v1.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primaria: #F39200; --fundo: #0E1117; --card: #161B22; --texto: #C9D1D9; --borda: #30363D; --sucesso: #238636; }
        body { font-family: 'Inter', sans-serif; background: var(--fundo); margin: 0; color: var(--texto); }
        
        /* LOGIN */
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--borda); width: 100%; max-width: 320px; text-align: center; }
        
        /* HEADER */
        .header { background: #161B22; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--borda); position: sticky; top: 0; z-index: 100; justify-content: space-between; }
        .nav-tabs { display: flex; gap: 8px; }
        .tab { cursor: pointer; padding: 8px 12px; border-radius: 6px; color: #8B949E; font-size: 0.8rem; border: 1px solid transparent; }
        .tab.active { background: var(--borda); color: var(--primaria); border-color: var(--primaria); }
        
        /* NOTIFICAÇÃO ANIMADA */
        .notif-icon { position: relative; cursor: pointer; font-size: 1.2rem; color: #8B949E; }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: #f85149; color: white; border-radius: 50%; padding: 2px 5px; font-size: 0.6rem; display: none; }
        .notif-badge.active { display: block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .content-section { display: none; animation: fadeIn 0.3s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--borda); margin-bottom: 20px; }
        .btn { background: var(--primaria); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .input-dark { background: #0D1117; border: 1px solid var(--borda); color: white; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .map-frame { width: 100%; height: 450px; border-radius: 8px; border: 1px solid var(--primaria); }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h3 style="color: var(--primaria)">Portal Nova Divulgação</h3>
            <input type="text" id="user" class="input-dark" placeholder="Usuário (admin, func ou cliente)">
            <input type="password" id="pass" class="input-dark" placeholder="Senha (123)">
            <button class="btn" onclick="autenticar()">Entrar</button>
        </div>
    </div>

    <div id="main-system" style="display:none;">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <b style="color:var(--primaria)">ADMIN</b>
                <div class="notif-icon" onclick="verNotif()">
                    <i class="fas fa-bell"></i>
                    <span id="badge" class="notif-badge">!</span>
                </div>
            </div>
            <div id="nav-area" class="nav-tabs">
                </div>
            <div style="cursor: pointer; font-size: 0.8rem;" onclick="location.reload()">Sair <i class="fas fa-sign-out-alt"></i></div>
        </div>

        <div class="container">
            <div id="view-admin" class="content-section">
                <h3>📊 Dashboard Geral</h3>
                <div class="card">Resumo financeiro e operacional para o gestor.</div>
            </div>

            <div id="view-func" class="content-section">
                <h3>📲 Painel do Motorista</h3>
                <button class="btn" style="background:var(--sucesso); height:80px;" onclick="enviarAlerta('Rota Iniciada')">
                    <i class="fas fa-play"></i> INICIAR ROTA
                </button>
                <div class="card" id="gps-debug" style="border-color: #3FB950;">
                    <h4><i class="fas fa-satellite"></i> Teste de GPS Real</h4>
                        <p id="status-gps">Aguardando ativação...</p>
                <div style="background: #0D1117; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.9rem;">
                    LAT: <span id="lat">---</span><br>
                    LONG: <span id="long">---</span>
                </div>
                    <button class="btn" style="background: #238636; margin-top: 10px;" onclick="pegarLocalizacao()">
                        Capturar Minha Posição
                    </button>
                </div>
            </div>

            <div id="view-mapa" class="content-section">
                <h3>📍 Rastreamento em Tempo Real</h3>
                <div class="card" id="info-cliente" style="display:none;">
                    <p>Cliente: <b>Supermercado Baratão</b> | Status: <b style="color:var(--primaria)">Em andamento</b></p>
                </div>
                <div class="card" style="padding:5px;">
                    <iframe class="map-frame"
                        src="https://maps.google.com/maps?q=Taquaritinga,SP&z=14&output=embed">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        function autenticar() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            const nav = document.getElementById('nav-area');
            
            if(p === "123") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-system').style.display = 'block';
                
                // Limpa abas
                nav.innerHTML = '';
                hideAll();

                if(u === "admin") {
                    nav.innerHTML = '<div class="tab active" onclick="openTab(event, \'view-admin\')">Geral</div><div class="tab" onclick="openTab(event, \'view-mapa\')">Mapa</div>';
                    document.getElementById('view-admin').classList.add('active');
                } else if(u === "func") {
                    document.getElementById('view-func').classList.add('active');
                } else if(u === "cliente") {
                    nav.innerHTML = '<div class="tab active">Minha Rota</div>';
                    document.getElementById('view-mapa').classList.add('active');
                    document.getElementById('info-cliente').style.display = 'block';
                }
            } else { alert("Senha 123"); }
        }

        function hideAll() {
            const sections = document.querySelectorAll('.content-section');
            sections.forEach(s => s.classList.remove('active'));
        }

        function openTab(evt, name) {
            hideAll();
            document.getElementById(name).classList.add('active');
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            evt.currentTarget.classList.add('active');
        }

        function enviarAlerta(msg) {
            alert(msg + "! Notificação enviada para o Admin e Cliente.");
            document.getElementById('badge').classList.add('active');
        }

        function verNotif() {
            alert("Última Notificação: Carro 01 iniciou a rota em Taquaritinga.");
            document.getElementById('badge').classList.remove('active');
        }

        function pegarLocalizacao() {
            const status = document.getElementById('status-gps');
            const latText = document.getElementById('lat');
            const longText = document.getElementById('long');
        
            if (!navigator.geolocation) {
                status.innerText = "GPS não suportado pelo seu navegador.";
                return;
            }
        
            status.innerText = "Localizando... (Dê permissão no celular)";
        
            // Esta função do navegador acessa o hardware de GPS
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latitude  = position.coords.latitude;
                    const longitude = position.coords.longitude;
        
                    status.innerText = "📍 Localização capturada!";
                    latText.innerText = latitude.toFixed(6);
                    longText.innerText = longitude.toFixed(6);
                    
                    console.log(`Posição capturada: Lat ${latitude}, Long ${longitude}`);
                    alert("Sucesso! O sistema capturou sua posição real.");
                },
                () => {
                    status.innerText = "Erro: Permissão de GPS negada.";
                    alert("Por favor, ative o GPS do celular e dê permissão ao navegador.");
                }
            );
        }
    </script>
</body>
</html>
