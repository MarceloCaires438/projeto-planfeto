<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Divulgação - Google Maps Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primaria: #F39200; --fundo: #0E1117; --card: #161B22; --texto: #C9D1D9; --borda: #30363D; --sucesso: #238636; }
        body { font-family: 'Inter', sans-serif; background: var(--fundo); margin: 0; color: var(--texto); }
        
        .header { background: #161B22; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--borda); position: sticky; top: 0; z-index: 100; justify-content: space-between; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--borda); margin-bottom: 20px; }
        .btn { background: var(--primaria); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        
        /* ESTILO DO MAPA GOOGLE */
        #google-map { width: 100%; height: 400px; border-radius: 8px; border: 1px solid var(--primaria); margin-top: 10px; }
        
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .input-dark { background: #0D1117; border: 1px solid var(--borda); color: white; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card" style="background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--borda); width: 320px; text-align: center;">
            <h3 style="color: var(--primaria)">Sistema Logístico</h3>
            <input type="text" id="user" class="input-dark" placeholder="Usuário (cliente)">
            <input type="password" id="pass" class="input-dark" placeholder="Senha">
            <button class="btn" onclick="autenticar()">Acessar Mapa</button>
        </div>
    </div>

    <div id="main-system" style="display:none;">
        <div class="header">
            <b id="user-title" style="color:var(--primaria)">LOGÍSTICA GOOGLE</b>
            <div style="cursor: pointer; font-size: 0.8rem;" onclick="location.reload()">Sair</div>
        </div>

        <div class="container">
            <div id="view-cliente" class="content-section active">
                <h3>📍 Rastreamento em Tempo Real</h3>
                <div class="card">
                    <p>Status: <b style="color:var(--sucesso)">Motorista em movimento</b></p>
                    <small>Última atualização: <span id="time">Agora mesmo</span></small>
                </div>
                
                <div id="google-map"></div>

                <div class="card" style="margin-top: 20px;">
                    <h4>Dados de Telemetria</h4>
                    <p>Velocidade Média: 42 km/h</p>
                    <p>Destino: Centro - Taquaritinga/SP</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI&callback=initMap" async defer></script>

    <script>
        let map;
        let marker;

        // Função que o Google Maps chama ao carregar
        function initMap() {
            // Centraliza em Taquaritinga (Fatec) por padrão
            const centro = { lat: -21.4300, lng: -48.5152 };
            
            map = new google.maps.Map(document.getElementById("google-map"), {
                zoom: 15,
                center: centro,
                styles: [ // Estilo Dark para o mapa combinar com seu sistema
                    { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                    { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] }
                ]
            });

            marker = new google.maps.Marker({
                position: centro,
                map: map,
                title: "Veículo de Entrega",
                icon: "https://maps.google.com/mapfiles/ms/icons/orange-dot.png"
            });
        }

        function autenticar() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            // Tenta pegar a localização real se o senhor permitir no navegador
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.setCenter(myPos);
                    marker.setPosition(myPos);
                });
            }
        }
    </script>
</body>
</html>
