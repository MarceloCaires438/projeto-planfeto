<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Logística</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <b id="user-display">SISTEMA</b>
        <a href="index.html" onclick="localStorage.clear()">Sair</a>
    </div>

    <div class="container">
        <div id="section-admin" class="content-section" style="display:none;">
            <h3>📊 Painel Administrativo</h3>
            <div class="card">Equipes na rua: <b>04</b></div>
        </div>

        <div id="section-func" class="content-section" style="display:none;">
            <h3>📲 Cadastro de Saída</h3>
            <div class="card" id="form-registro">
                <input type="text" id="nome-func" placeholder="Nome do Funcionário" style="background:#0D1117; color:white; padding:10px; width:90%; margin-bottom:10px; border:1px solid #30363D;">
                <select id="tipo-modal" style="background:#0D1117; color:white; padding:10px; width:96%; border:1px solid #30363D;">
                    <option value="pe">A Pé (Panfletagem)</option>
                    <option value="carro">Carro de Som</option>
                </select>
                <button class="btn" onclick="iniciarServico()" style="margin-top:15px;">SALVAR E INICIAR</button>
            </div>
            <div id="status-servico" class="card" style="display:none; border-left: 5px solid #238636;">
                <p>Status: <b>Em Rota</b></p>
                <button class="btn" style="background:#30363D">Capturar GPS</button>
            </div>
        </div>

        <div id="section-cliente" class="content-section" style="display:none;">
            <h3>📋 Relatório do Cliente</h3>
            <div class="card">Status: <b>65% Concluído</b></div>
        </div>
    </div>

    <div class="menu">
        <a href="dashboard.html" style="color:#F39200">Home</a>
        <a href="mapa.html">Mapa</a>
    </div>

    <script>
        window.onload = function() {
            const user = localStorage.getItem("usuarioLogado");
            if(!user) {
                window.location.assign("index.html");
                return;
            }
            
            document.getElementById('user-display').innerText = user.toUpperCase();
            
            if(user === "admin") document.getElementById('section-admin').style.display = "block";
            else if(user === "func") document.getElementById('section-func').style.display = "block";
            else if(user === "cliente") document.getElementById('section-cliente').style.display = "block";
        }

        function iniciarServico() {
            const nome = document.getElementById('nome-func').value;
            if(!nome) return alert("Digite seu nome!");
            document.getElementById('form-registro').style.display = "none";
            document.getElementById('status-servico').style.display = "block";
            alert("Trabalho iniciado para: " + nome);
        }
    </script>
</body>
</html>
