<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Nova Divulgação</title>
    <style>
        :root { --primaria: #F39200; --fundo: #0E1117; --card: #161B22; --texto: #C9D1D9; --borda: #30363D; --sucesso: #238636; }
        body { font-family: sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding-bottom: 90px; }
        
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid var(--borda); text-align: center; font-weight: bold; }
        
        .container { padding: 15px; max-width: 450px; margin: auto; }
        
        .logo-perfil { max-width: 180px; height: auto; display: block; margin: 10px auto 20px; }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--borda); margin-bottom: 15px; text-align: left; }
        
        .user-info { text-align: center; margin-bottom: 20px; }
        .user-info h2 { margin: 5px 0; color: var(--primaria); }
        .badge { background: var(--borda); color: var(--primaria); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #21262d; font-size: 0.9rem; }
        .info-row:last-child { border-bottom: none; }
        .label { color: #8B949E; }

        .btn-logout { background: #f85149; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-suporte { background: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; text-decoration: none; display: block; text-align: center; }

        .menu { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--borda); display: flex; justify-content: space-around; padding: 15px 0; }
        .menu a { color: #8B949E; text-decoration: none; font-size: 0.9rem; }
        .menu a.active { color: var(--primaria); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">PERFIL DO USUÁRIO</div>

    <div class="container">
        <img src="nova_divulgacao_logo.png" class="logo-perfil">

        <div class="user-info">
            <div style="font-size: 50px;">👤</div>
            <h2 id="nome-exibicao">Carregando...</h2>
            <span class="badge" id="cargo-exibicao">USUÁRIO</span>
        </div>

        <div class="card">
            <h4><i class="fas fa-info-circle"></i> Informações Profissionais</h4>
            <div class="info-row">
                <span class="label">Empresa:</span>
                <span>Nova Divulgação</span>
            </div>
            <div class="info-row">
                <span class="label">Unidade:</span>
                <span>Taquaritinga/SP</span>
            </div>
            <div id="info-extra">
                </div>
        </div>

        <div class="card">
            <h4><i class="fas fa-headset"></i> Ajuda e Suporte</h4>
            <p style="font-size: 0.8rem; color: #8B949E;">Problemas com o GPS ou aplicativo?</p>
            <a href="#" class="btn-suporte" onclick="alert('Chamando suporte via WhatsApp...')">Falar com Gestor</a>
        </div>

        <button class="btn-logout" onclick="logout()">SAIR DO SISTEMA</button>
    </div>

    <div class="menu">
        <a href="dashboard.html">Home</a>
        <a href="mapa.html">Mapa</a>
        <a href="perfil.html" class="active">Perfil</a>
    </div>

    <script>
        window.onload = function() {
            const user = localStorage.getItem("usuarioLogado");
            if (!user) {
                window.location.assign("index.html");
                return;
            }

            document.getElementById('nome-exibicao').innerText = user.toUpperCase();
            document.getElementById('cargo-exibicao').innerText = "NÍVEL: " + user.toUpperCase();

            // Adiciona informações baseadas no cargo
            const infoExtra = document.getElementById('info-extra');
            if (user === "func") {
                infoExtra.innerHTML = `
                    <div class="info-row">
                        <span class="label">Status:</span>
                        <span style="color: var(--sucesso)">Ativo / Treinado</span>
                    </div>
                    <div class="info-row">
                        <span class="label">ID Colaborador:</span>
                        <span>#00${Math.floor(Math.random() * 100)}</span>
                    </div>
                `;
            } else if (user === "admin") {
                infoExtra.innerHTML = `
                    <div class="info-row">
                        <span class="label">Permissão:</span>
                        <span>Administrador Total</span>
                    </div>
                `;
            }
        };

        function logout() {
            localStorage.clear();
            window.location.assign("index.html");
        }
    </script>
</body>
</html>
